<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="#4F46E5"/>
  <!-- Subtle inner glow -->
  <rect width="64" height="64" rx="14" fill="url(#grad)" opacity="0.4"/>
  <!-- Checkmark square icon (checkbox) -->
  <!-- Outer square -->
  <rect x="12" y="14" width="26" height="26" rx="5" stroke="white" stroke-width="3.5" fill="none"/>
  <!-- Checkmark inside -->
  <polyline points="17,27 22,33 30,22" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Three task lines on the right side -->
  <line x1="42" y1="19" x2="54" y2="19" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
  <line x1="42" y1="27" x2="54" y2="27" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <line x1="42" y1="35" x2="50" y2="35" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <!-- Bottom bar (progress) -->
  <rect x="12" y="48" width="40" height="5" rx="2.5" fill="white" opacity="0.2"/>
  <rect x="12" y="48" width="26" height="5" rx="2.5" fill="white" opacity="0.7"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>
</svg>